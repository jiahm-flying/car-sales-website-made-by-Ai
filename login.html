<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | QMSL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --black-solid: #0a0a0a;
            --white-solid: #ffffff;
            --black-text: #111111;
            --white-text: #ffffff;
            --secondary-black: rgba(0,0,0,0.55);
            --secondary-white: rgba(255,255,255,0.60);
            --tertiary-black: rgba(0,0,0,0.30);
            --tertiary-white: rgba(255,255,255,0.35);
            --border-black: rgba(0,0,0,0.08);
            --border-white: rgba(255,255,255,0.10);
            --input-bg-black: rgba(255,255,255,0.06);
            --input-bg-white: rgba(0,0,0,0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', 'Helvetica Neue', 'Segoe UI', sans-serif;
            background-color: var(--black-solid);
            color: var(--white-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            letter-spacing: 0.02em;
        }

        /* ── Fixed Navbar ─────────────────────── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-white);
            z-index: 1000;
            padding: 18px 0;
            transition: all 0.2s ease;
        }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .logo:hover { opacity: 0.75; }
        .nav-links {
            display: flex;
            gap: 2.2rem;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #ffffff; }

        /* ── Main Content ─────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 140px 32px 60px;
            width: 100%;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            width: 100%;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-black);
            border-radius: 16px;
            padding: 48px;
            max-width: 460px;
            margin: 0 auto;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            color: var(--black-text);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .card-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--black-text);
            margin-bottom: 6px;
        }
        .card-header .subtitle {
            font-size: 0.9rem;
            color: var(--secondary-black);
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            color: var(--secondary-black);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--input-bg-white);
            border: 1px solid var(--border-black);
            border-radius: 8px;
            color: var(--black-text);
            outline: none;
            transition: border 0.2s, background 0.2s;
        }
        .form-group input:focus {
            border-color: rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.02);
        }
        .form-group input.input-error {
            border-color: rgba(0,0,0,0.2);
            background: rgba(0,0,0,0.02);
        }
        .error-message {
            font-size: 0.75rem;
            color: var(--secondary-black);
            margin-top: 6px;
            min-height: 18px;
            letter-spacing: 0.03em;
            transition: opacity 0.2s;
        }

        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: var(--black-solid);
            color: var(--white-text);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: 8px;
        }
        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-submit:active {
            transform: translateY(0);
        }

        .success-msg {
            background: rgba(0,0,0,0.03);
            border: 1px solid var(--border-black);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 28px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--black-text);
            letter-spacing: 0.04em;
            display: none;
        }
        .success-msg.show {
            display: block;
        }

        .card-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--secondary-black);
            letter-spacing: 0.04em;
        }
        .card-footer a {
            color: var(--black-text);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--secondary-black);
            transition: opacity 0.2s;
        }
        .card-footer a:hover {
            opacity: 0.7;
        }

        /* ── Footer ──────────────────────────── */
        .footer {
            background-color: #0a0a0a;
            padding: 48px 0;
            text-align: center;
            border-top: 1px solid var(--border-white);
        }
        .footer p {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .nav-links {
                gap: 1.5rem;
            }
            .login-card {
                padding: 32px 24px;
            }
        }
        @media (max-width: 480px) {
            .main-content {
                padding: 120px 16px 40px;
            }
            .login-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">QMSL</a>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="search.html">SEARCH</a></li>
                <li><a href="add-car.html">ADD CAR</a></li>
                <li><a href="inventory.html">INVENTORY</a></li>
                <li><a href="login.html">LOGIN</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="login-card">
            <div class="success-msg" id="successMsg"></div>
            <div class="card-header">
                <h1>SELLER LOGIN</h1>
                <p class="subtitle">Sign in to manage your vehicles</p>
            </div>
            <form id="loginForm" method="POST" action="login.php" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" maxlength="40" required>
                    <div class="error-message" id="username-error"></div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" maxlength="60" required>
                    <div class="error-message" id="password-error"></div>
                </div>
                <button type="submit" class="btn-submit">LOG IN</button>
            </form>
            <div class="card-footer">
                Don't have an account? <a href="register.php">Register here</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2025 QMSL. All rights reserved.</p>
        </div>
    </footer>

    <script>
        (function() {
            'use strict';

            const form = document.getElementById('loginForm');
            const successMsg = document.getElementById('successMsg');
            const fields = {
                username: document.getElementById('username'),
                password: document.getElementById('password')
            };
            const errors = {
                username: document.getElementById('username-error'),
                password: document.getElementById('password-error')
            };

            function showError(fieldId, message) {
                fields[fieldId].classList.add('input-error');
                errors[fieldId].textContent = message;
            }
            function clearError(fieldId) {
                fields[fieldId].classList.remove('input-error');
                errors[fieldId].textContent = '';
            }

            function validateField(fieldId) {
                const value = fields[fieldId].value.trim();
                const label = fieldId === 'username' ? 'Username' : 'Password';
                if (!value) {
                    showError(fieldId, `${label} is required.`);
                    return false;
                }
                clearError(fieldId);
                return true;
            }

            function validateAll() {
                let valid = true;
                Object.keys(fields).forEach(fid => {
                    if (!validateField(fid)) valid = false;
                });
                return valid;
            }

            Object.keys(fields).forEach(fid => {
                fields[fid].addEventListener('input', function() {
                    if (this.value.trim() !== '') clearError(fid);
                    successMsg.classList.remove('show');
                });
                fields[fid].addEventListener('blur', function() {
                    if (this.value.trim() !== '') validateField(fid);
                });
            });

            form.addEventListener('submit', function(e) {
                successMsg.classList.remove('show');
                if (!validateAll()) {
                    e.preventDefault();
                    return;
                }
                // 校验通过：POST 提交到 login.php（PHP Session + MySQL）
            });
        })();
    </script>
</body>
</html>
