<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | QMSL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --black-solid: #0a0a0a;
            --white-solid: #ffffff;
            --black-text: #111111;
            --white-text: #ffffff;
            --secondary-black: rgba(0,0,0,0.55);
            --secondary-white: rgba(255,255,255,0.60);
            --tertiary-black: rgba(0,0,0,0.30);
            --tertiary-white: rgba(255,255,255,0.35);
            --border-black: rgba(0,0,0,0.08);
            --border-white: rgba(255,255,255,0.10);
            --input-bg-black: rgba(255,255,255,0.06);
            --input-bg-white: rgba(0,0,0,0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', 'Helvetica Neue', 'Segoe UI', sans-serif;
            background-color: var(--black-solid);
            color: var(--white-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            letter-spacing: 0.02em;
        }

        /* ── Fixed Navbar ─────────────────────── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-white);
            z-index: 1000;
            padding: 18px 0;
            transition: all 0.2s ease;
        }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .logo:hover { opacity: 0.75; }
        .nav-links {
            display: flex;
            gap: 2.2rem;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #ffffff; }

        /* ── Main Content ─────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 140px 32px 60px;
            width: 100%;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            width: 100%;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-black);
            border-radius: 16px;
            padding: 48px;
            max-width: 560px;
            margin: 0 auto;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            color: var(--black-text);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .card-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--black-text);
            margin-bottom: 6px;
        }
        .card-header .subtitle {
            font-size: 0.9rem;
            color: var(--secondary-black);
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            color: var(--secondary-black);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--input-bg-white);
            border: 1px solid var(--border-black);
            border-radius: 8px;
            color: var(--black-text);
            outline: none;
            transition: border 0.2s, background 0.2s;
        }
        .form-group input:focus {
            border-color: rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.02);
        }
        .form-group input.input-error {
            border-color: rgba(0,0,0,0.2);
            background: rgba(0,0,0,0.02);
        }
        .error-message {
            font-size: 0.75rem;
            color: var(--secondary-black);
            margin-top: 6px;
            min-height: 18px;
            letter-spacing: 0.03em;
            transition: opacity 0.2s;
        }

        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: var(--black-solid);
            color: var(--white-text);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: 8px;
        }
        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-submit:active {
            transform: translateY(0);
        }

        .success-msg {
            background: rgba(0,0,0,0.03);
            border: 1px solid var(--border-black);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 28px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--black-text);
            letter-spacing: 0.04em;
            display: none;
        }
        .success-msg.show {
            display: block;
        }

        .card-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--secondary-black);
            letter-spacing: 0.04em;
        }
        .card-footer a {
            color: var(--black-text);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--secondary-black);
            transition: opacity 0.2s;
        }
        .card-footer a:hover {
            opacity: 0.7;
        }

        /* ── Footer ──────────────────────────── */
        .footer {
            background-color: #0a0a0a;
            padding: 48px 0;
            text-align: center;
            border-top: 1px solid var(--border-white);
        }
        .footer p {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }

        @media (max-width: 1024px) {
            .car-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 22px;
            }
            .search-hero {
                padding: 48px 0 56px;
                min-height: auto;
            }
            .search-hero-title {
                font-size: 2.2rem;
            }
            .search-panel {
                padding: 24px 24px;
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding-top: 70px;
            }
            .navbar {
                padding: 14px 0;
            }
            .nav-container {
                padding: 0 20px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .logo {
                font-size: 1.5rem;
            }
            .nav-links {
                gap: 1.5rem;
            }
            .nav-links a {
                font-size: 0.8rem;
            }

            .search-hero {
                padding: 40px 0 50px;
                min-height: auto;
            }
            .search-hero-title {
                font-size: 1.8rem;
            }
            .search-hero-subtitle {
                font-size: 0.9rem;
                margin-bottom: 24px;
            }
            .search-panel {
                padding: 20px 18px;
                gap: 14px;
            }
            .search-row {
                flex-direction: column;
                gap: 12px;
            }
            .search-field {
                min-width: 100%;
            }
            .search-actions {
                flex-direction: row;
                width: 100%;
                flex-wrap: wrap;
            }
            .search-actions button {
                flex: 1;
                white-space: normal;
                text-align: center;
            }
            .car-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
            }
            .container {
                padding: 0 20px;
            }
            .results-section {
                padding: 40px 0 50px;
            }
            .results-header {
                margin-bottom: 24px;
            }
            .empty-state {
                padding: 60px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 600px) {
            .car-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .search-hero-title {
                font-size: 1.6rem;
            }
            .search-panel {
                padding: 16px 14px;
                gap: 12px;
            }
            .search-field input {
                padding: 12px 14px;
                font-size: 0.9rem;
            }
            .btn-primary-dark,
            .btn-ghost-dark {
                padding: 12px 16px;
                font-size: 0.8rem;
                letter-spacing: 0.06em;
            }
            .card-body {
                padding: 16px 18px 18px;
                gap: 6px;
            }
            .car-title {
                font-size: 1rem;
            }
            .price {
                font-size: 1.1rem;
            }
            .modal-panel {
                max-width: 100%;
                margin: 0 8px;
            }
            .modal-body {
                padding: 20px 18px 24px;
            }
            .modal-title {
                font-size: 1.3rem;
            }
            .modal-specs {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .modal-price-large {
                font-size: 1.5rem;
            }
            .modal-close {
                top: 12px;
                right: 12px;
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding-top: 64px;
            }
            .container {
                padding: 0 14px;
            }
            .navbar {
                padding: 10px 0;
            }
            .nav-container {
                padding: 0 14px;
                gap: 8px;
            }
            .logo {
                font-size: 1.3rem;
                letter-spacing: 0.08em;
            }
            .nav-links {
                gap: 1rem;
                flex-wrap: wrap;
            }
            .nav-links a {
                font-size: 0.7rem;
                letter-spacing: 0.05em;
            }

            .search-hero {
                padding: 32px 0 40px;
            }
            .search-hero-title {
                font-size: 1.5rem;
                letter-spacing: 0.05em;
            }
            .search-hero-subtitle {
                font-size: 0.8rem;
                margin-bottom: 20px;
            }
            .search-panel {
                padding: 14px 12px;
                gap: 10px;
            }
            .search-field label {
                font-size: 0.65rem;
            }
            .search-field input {
                padding: 10px 12px;
                font-size: 0.8rem;
            }
            .search-actions {
                gap: 8px;
            }
            .btn-primary-dark,
            .btn-ghost-dark {
                padding: 10px 14px;
                font-size: 0.75rem;
            }

            .results-section {
                padding: 30px 0 40px;
            }
            .results-count {
                font-size: 0.95rem;
            }
            .car-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .card-body {
                padding: 14px 14px 16px;
                gap: 4px;
            }
            .car-title {
                font-size: 0.95rem;
            }
            .car-meta {
                font-size: 0.7rem;
                gap: 10px;
            }
            .car-meta span+span::before {
                left: -7px;
            }
            .car-details {
                font-size: 0.7rem;
            }
            .price {
                font-size: 1rem;
            }
            .location {
                font-size: 0.7rem;
            }

            .modal-overlay {
                padding: 12px;
            }
            .modal-panel {
                max-height: 85vh;
            }
            .modal-img {
                aspect-ratio: 4/3;
            }
            .modal-body {
                padding: 16px 14px 20px;
            }
            .modal-title {
                font-size: 1.2rem;
            }
            .modal-subtitle {
                font-size: 0.75rem;
                margin-bottom: 14px;
            }
            .modal-specs {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 14px 0;
                margin-bottom: 18px;
            }
            .modal-spec-label {
                font-size: 0.6rem;
            }
            .modal-spec-value {
                font-size: 0.85rem;
            }
            .modal-price-large {
                font-size: 1.3rem;
                margin-bottom: 14px;
            }
            .modal-description {
                font-size: 0.8rem;
                line-height: 1.6;
            }
            .modal-contact {
                font-size: 0.75rem;
            }
            .modal-close {
                top: 10px;
                right: 10px;
                width: 30px;
                height: 30px;
                font-size: 0.9rem;
            }
            .empty-state {
                padding: 40px 16px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 360px) {
            .search-hero-title {
                font-size: 1.3rem;
            }
            .search-field input {
                padding: 8px 10px;
                font-size: 0.75rem;
            }
            .btn-primary-dark,
            .btn-ghost-dark {
                padding: 8px 10px;
                font-size: 0.7rem;
                letter-spacing: 0.04em;
            }
            .car-title {
                font-size: 0.9rem;
            }
            .price {
                font-size: 0.95rem;
            }
            .modal-title {
                font-size: 1.1rem;
            }
            .modal-price-large {
                font-size: 1.2rem;
            }
        }

        @media (pointer: coarse) {
            .car-card {
                cursor: default;
            }
            .btn-primary-dark,
            .btn-ghost-dark,
            .modal-close {
                min-height: 44px;
                min-width: 44px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
            .nav-links a {
                padding: 6px 0;
                display: inline-block;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .car-card {
                animation: none;
            }
            * {
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">QMSL</a>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="search.html">SEARCH</a></li>
                <li><a href="add-car.html">ADD CAR</a></li>
                <li><a href="inventory.html">INVENTORY</a></li>
                <li><a href="login.html">LOGIN</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="register-card">
            <div class="success-msg" id="successMsg"></div>
            <div class="card-header">
                <h1>SELLER REGISTRATION</h1>
                <p class="subtitle">Create your account to list vehicles</p>
            </div>
            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Zhang Wei" autocomplete="name" maxlength="80" required>
                    <div class="error-message" id="name-error"></div>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="e.g. 123 Chaoyang Road Apt 4B" maxlength="150" required>
                    <div class="error-message" id="address-error"></div>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="e.g. 13812345678" maxlength="11" inputmode="numeric" required>
                    <div class="error-message" id="phone-error"></div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="e.g. seller@example.com" maxlength="120" required>
                    <div class="error-message" id="email-error"></div>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="At least 6 alphanumeric characters" maxlength="40" required>
                    <div class="error-message" id="username-error"></div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 alphanumeric characters" maxlength="60" required>
                    <div class="error-message" id="password-error"></div>
                </div>
                <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
            </form>
            <div class="card-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2025 QMSL. All rights reserved.</p>
        </div>
    </footer>

    <!-- ══════════════ 外部共享数据模块 ══════════════ -->
    <script src="qmsl-data.js"></script>

    <!-- ══════════════ Registration Logic ══════════════ -->
    <script>
        (function() {
            'use strict';

            // 如果已经登录，直接跳转首页
            const currentUser = window.QMSL.getCurrentUser();
            if (currentUser) {
                window.location.href = 'index.html';
                return;
            }

            const form = document.getElementById('registerForm');
            const successMsg = document.getElementById('successMsg');
            const fields = {
                name: document.getElementById('name'),
                address: document.getElementById('address'),
                phone: document.getElementById('phone'),
                email: document.getElementById('email'),
                username: document.getElementById('username'),
                password: document.getElementById('password')
            };
            const errors = {
                name: document.getElementById('name-error'),
                address: document.getElementById('address-error'),
                phone: document.getElementById('phone-error'),
                email: document.getElementById('email-error'),
                username: document.getElementById('username-error'),
                password: document.getElementById('password-error')
            };

            const validators = {
                name: { regex: /^[A-Za-z ]+$/, emptyMsg: 'Name is required.', invalidMsg: 'Only letters and spaces allowed.' },
                address: { regex: /^[A-Za-z0-9 ]+$/, emptyMsg: 'Address is required.', invalidMsg: 'Only letters, numbers, and spaces allowed.' },
                phone: { regex: /^1[3-9]\d{9}$/, emptyMsg: 'Phone number is required.', invalidMsg: 'Invalid China mobile number (11 digits, starts with 1).' },
                email: { regex: /^[a-zA-Z0-9._%+\-]+@[a-zA-Z0-9.\-]+\.(cn|com)$/, emptyMsg: 'Email is required.', invalidMsg: 'Email must contain @ and end with .cn or .com.' },
                username: { regex: /^[A-Za-z0-9]{6,}$/, emptyMsg: 'Username is required.', invalidMsg: 'At least 6 alphanumeric characters.' },
                password: { regex: /^[A-Za-z0-9]{6,}$/, emptyMsg: 'Password is required.', invalidMsg: 'At least 6 alphanumeric characters.' }
            };

            function showError(fieldId, message) {
                fields[fieldId].classList.add('input-error');
                errors[fieldId].textContent = message;
            }
            function clearError(fieldId) {
                fields[fieldId].classList.remove('input-error');
                errors[fieldId].textContent = '';
            }

            function validateField(fieldId) {
                const value = fields[fieldId].value.trim();
                const cfg = validators[fieldId];
                if (!value) { showError(fieldId, cfg.emptyMsg); return false; }
                if (!cfg.regex.test(value)) { showError(fieldId, cfg.invalidMsg); return false; }
                clearError(fieldId);
                return true;
            }

            function validateAll() {
                let valid = true;
                Object.keys(fields).forEach(fid => { if (!validateField(fid)) valid = false; });
                return valid;
            }

            Object.keys(fields).forEach(fid => {
                fields[fid].addEventListener('input', function() {
                    if (this.value.trim() !== '') validateField(fid); else clearError(fid);
                    successMsg.classList.remove('show');
                });
                fields[fid].addEventListener('blur', function() {
                    if (this.value.trim() !== '') validateField(fid);
                });
            });

            ['username', 'password'].forEach(fid => {
                fields[fid].addEventListener('input', function() { this.value = this.value.replace(/\s/g, ''); });
            });
            fields.phone.addEventListener('input', function() { this.value = this.value.replace(/\D/g, '').slice(0, 11); });

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                successMsg.classList.remove('show');
                if (!validateAll()) return;

                const data = {
                    name: fields.name.value.trim(),
                    address: fields.address.value.trim(),
                    phone: fields.phone.value.trim(),
                    email: fields.email.value.trim(),
                    username: fields.username.value.trim(),
                    password: fields.password.value.trim()
                };

                try {
                    const result = window.QMSL.register(data.name, data.address, data.phone, data.email, data.username, data.password);
                    if (result) {
                        successMsg.textContent = 'Registration successful. Redirecting...';
                        successMsg.classList.add('show');
                        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                    } else {
                        showError('username', 'Username already taken.');
                    }
                } catch (err) {
                    console.error('Registration error:', err);
                    showError('username', 'Registration failed. Please try again.');
                }
            });
        })();
    </script>
</body>
</html>
