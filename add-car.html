<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Car | QMSL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* --- NAVIGATION (FIXED COMPONENT) --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
            padding: 18px 0;
            transition: all 0.2s ease;
        }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .logo:hover { opacity: 0.75; }
        .nav-links {
            display: flex;
            gap: 2.2rem;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #ffffff; }

        /* --- HERO SECTION (BLACK ZONE) --- */
        .hero-section {
            padding-top: 180px;
            padding-bottom: 100px;
            background-color: #000;
            text-align: center;
        }

        .hero-section h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-section p {
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.1em;
            font-weight: 300;
        }

        /* --- FORM SECTION (WHITE ZONE) --- */
        .form-section {
            background-color: #ffffff;
            padding: 100px 0;
            color: #000;
        }

        .form-card {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.5);
        }

        input, select {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #000;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #000;
            background: #fff;
        }

        .error-msg {
            color: #000;
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 500;
            display: none;
        }

        /* --- BUTTONS --- */
        .btn-submit {
            width: 100%;
            padding: 20px;
            background-color: #000;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin-top: 20px;
        }

        .btn-submit:hover {
            opacity: 0.85;
        }

        /* --- FOOTER (FIXED COMPONENT) --- */
        .footer {
            background-color: #0a0a0a;
            padding: 48px 0;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .footer p {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .nav-links {
                gap: 1.5rem;
            }
            .hero-section h1 { font-size: 2rem; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .form-card { padding: 30px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">QMSL</a>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="search.html">SEARCH</a></li>
            <li><a href="add-car.html">ADD CAR</a></li>
            <li><a href="inventory.html">INVENTORY</a></li>
            <li><a href="login.html">LOGIN</a></li>
        </ul>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <h1>List Your Vehicle</h1>
        <p>CONVERT ASSETS TO CAPITAL WITH INDUSTRIAL PRECISION</p>
    </div>
</section>

<section class="form-section">
    <div class="container">
        <div class="form-card">
            <form id="addCarForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="brand">Brand</label>
                        <input type="text" id="brand" placeholder="e.g. Porsche" required>
                        <div class="error-msg" id="brandError">Field required</div>
                    </div>
                    <div class="form-group">
                        <label for="model">Model</label>
                        <input type="text" id="model" placeholder="e.g. 911 Turbo S" required>
                    </div>
                    <div class="form-group">
                        <label for="year">Year</label>
                        <input type="number" id="year" placeholder="2024" min="1900" max="2026" required>
                    </div>
                    <div class="form-group">
                        <label for="price">Price ($)</label>
                        <input type="number" id="price" placeholder="150000" required>
                    </div>
                    <div class="form-group">
                        <label for="mileage">Mileage (mi)</label>
                        <input type="number" id="mileage" placeholder="500" required>
                    </div>
                    <div class="form-group">
                        <label for="color">Color</label>
                        <input type="text" id="color" placeholder="Obsidian Black" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="location">Location</label>
                        <input type="text" id="location" placeholder="San Francisco, CA" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="image">Image URL (Optional)</label>
                        <input type="url" id="image" placeholder="https://images.unsplash.com/...">
                    </div>
                </div>
                <button type="submit" class="btn-submit">Initialize Listing</button>
                <div id="statusMessage" style="text-align: center; margin-top: 20px; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;"></div>
            </form>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <p>© 2025 QMSL. All rights reserved.</p>
    </div>
</footer>

<script src="js/qmsl-data.js"></script> 
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 检查登录状态 (Check Login State)
        const user = window.QMSL ? window.QMSL.getCurrentUser() : null;
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        const form = document.getElementById('addCarForm');
        const statusMsg = document.getElementById('statusMessage');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            // 收集数据 (Collect Data)
            const carData = {
                brand: document.getElementById('brand').value.trim(),
                model: document.getElementById('model').value.trim(),
                year: parseInt(document.getElementById('year').value),
                price: parseFloat(document.getElementById('price').value),
                mileage: parseInt(document.getElementById('mileage').value),
                color: document.getElementById('color').value.trim(),
                location: document.getElementById('location').value.trim(),
                image: document.getElementById('image').value.trim() || `https://placehold.co/600x400/1a1a1a/ffffff?text=${document.getElementById('brand').value}+${document.getElementById('model').value}`
            };

            // 简单验证 (Basic Validation)
            if (!carData.brand || !carData.model || isNaN(carData.price)) {
                statusMsg.textContent = "Error: Invalid parameters provided.";
                return;
            }

            // 调用 QMSL 模块 (Call QMSL Module)
            try {
                const success = window.QMSL.addCar(carData);
                if (success) {
                    statusMsg.textContent = "Success: Vehicle integrated into inventory.";
                    setTimeout(() => {
                        window.location.href = 'inventory.html';
                    }, 1500);
                } else {
                    statusMsg.textContent = "Error: System failed to process entry.";
                }
            } catch (err) {
                console.error("Data module error:", err);
                statusMsg.textContent = "Error: Shared data module not detected.";
            }
        });
    });
</script>

</body>
</html>
