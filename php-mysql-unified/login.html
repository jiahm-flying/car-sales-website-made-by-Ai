<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | QMSL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --black-solid: #0a0a0a;
            --white-solid: #ffffff;
            --black-text: #111111;
            --white-text: #ffffff;
            --secondary-black: rgba(0,0,0,0.55);
            --secondary-white: rgba(255,255,255,0.60);
            --tertiary-black: rgba(0,0,0,0.30);
            --tertiary-white: rgba(255,255,255,0.35);
            --border-black: rgba(0,0,0,0.08);
            --border-white: rgba(255,255,255,0.10);
            --input-bg-black: rgba(255,255,255,0.06);
            --input-bg-white: rgba(0,0,0,0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', 'Helvetica Neue', 'Segoe UI', sans-serif;
            background-color: var(--black-solid);
            color: var(--white-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            letter-spacing: 0.02em;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-white);
            z-index: 1000;
            padding: 18px 0;
            transition: all 0.2s ease;
        }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .logo:hover { opacity: 0.75; }
        .nav-links {
            display: flex;
            gap: 2.2rem;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #ffffff; }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 140px 32px 60px;
            width: 100%;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            width: 100%;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-black);
            border-radius: 16px;
            padding: 48px;
            max-width: 460px;
            margin: 0 auto;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            color: var(--black-text);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .card-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--black-text);
            margin-bottom: 6px;
        }
        .card-header .subtitle {
            font-size: 0.9rem;
            color: var(--secondary-black);
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            color: var(--secondary-black);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--input-bg-white);
            border: 1px solid var(--border-black);
            border-radius: 8px;
            color: var(--black-text);
            outline: none;
            transition: border 0.2s, background 0.2s;
        }
        .form-group input:focus {
            border-color: rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.02);
        }
        .form-group input.input-error {
            border-color: rgba(0,0,0,0.2);
            background: rgba(0,0,0,0.02);
        }
        .error-message {
            font-size: 0.75rem;
            color: var(--secondary-black);
            margin-top: 6px;
            min-height: 18px;
            letter-spacing: 0.03em;
            transition: opacity 0.2s;
        }

        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: var(--black-solid);
            color: var(--white-text);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: 8px;
        }
        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-submit:active {
            transform: translateY(0);
        }

        .success-msg {
            background: rgba(0,0,0,0.03);
            border: 1px solid var(--border-black);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 28px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--black-text);
            letter-spacing: 0.04em;
            display: none;
        }
        .success-msg.show {
            display: block;
        }

        .card-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--secondary-black);
            letter-spacing: 0.04em;
        }
        .card-footer a {
            color: var(--black-text);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--secondary-black);
            transition: opacity 0.2s;
        }
        .card-footer a:hover {
            opacity: 0.7;
        }

        .footer {
            background-color: #0a0a0a;
            padding: 48px 0;
            text-align: center;
            border-top: 1px solid var(--border-white);
        }
        .footer p {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .nav-links {
                gap: 1.5rem;
            }
            .login-card {
                padding: 32px 24px;
            }
        }
        @media (max-width: 480px) {
            .main-content {
                padding: 120px 16px 40px;
            }
            .login-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">QMSL</a>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="search.html">SEARCH</a></li>
                <li><a href="add-car.html">ADD CAR</a></li>
                <li><a href="inventory.html">INVENTORY</a></li>
                <li><a href="login.html">LOGIN</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="login-card">
            <div class="success-msg" id="successMsg"></div>
            <div class="card-header">
                <h1>SELLER LOGIN</h1>
                <p class="subtitle">Sign in to manage your vehicles</p>
            </div>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" maxlength="40" required>
                    <div class="error-message" id="username-error"></div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" maxlength="60" required>
                    <div class="error-message" id="password-error"></div>
                </div>
                <button type="submit" class="btn-submit">LOG IN</button>
            </form>
            <div class="card-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 QMSL. All rights reserved.</p>
        </div>
    </footer>

    <script>
        (function() {
            'use strict';

            const form = document.getElementById('loginForm');
            const successMsg = document.getElementById('successMsg');
            const fields = {
                username: document.getElementById('username'),
                password: document.getElementById('password')
            };
            const errors = {
                username: document.getElementById('username-error'),
                password: document.getElementById('password-error')
            };

            function showError(fieldId, message) {
                fields[fieldId].classList.add('input-error');
                errors[fieldId].textContent = message;
            }
            function clearError(fieldId) {
                fields[fieldId].classList.remove('input-error');
                errors[fieldId].textContent = '';
            }

            function validateField(fieldId) {
                const value = fields[fieldId].value.trim();
                const label = fieldId === 'username' ? 'Username' : 'Password';
                if (!value) {
                    showError(fieldId, `${label} is required.`);
                    return false;
                }
                clearError(fieldId);
                return true;
            }

            function validateAll() {
                let valid = true;
                Object.keys(fields).forEach(fid => {
                    if (!validateField(fid)) valid = false;
                });
                return valid;
            }

            async function checkAuth() {
                try {
                    const response = await fetch('./api/auth/me.php', {
                        method: 'GET',
                        credentials: 'include'
                    });
                    const result = await response.json();
                    if (result.ok) {
                        window.location.href = 'index.html';
                    }
                } catch (err) {
                    console.error('Auth check failed:', err);
                }
            }

            Object.keys(fields).forEach(fid => {
                fields[fid].addEventListener('input', function() {
                    if (this.value.trim() !== '') clearError(fid);
                    successMsg.classList.remove('show');
                });
                fields[fid].addEventListener('blur', function() {
                    if (this.value.trim() !== '') validateField(fid);
                });
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                successMsg.classList.remove('show');
                if (!validateAll()) return;

                const username = fields.username.value.trim();
                const password = fields.password.value.trim();

                try {
                    const response = await fetch('./api/auth/login.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ username, password })
                    });
                    const result = await response.json();

                    if (result.ok) {
                        successMsg.textContent = 'Login successful. Redirecting...';
                        successMsg.classList.add('show');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        showError('username', result.message || 'Invalid username or password.');
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    showError('username', 'Login failed. Please try again.');
                }
            });

            checkAuth();
        })();
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - PHP MySQL Demo</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 420px; margin: 48px auto; padding: 0 16px; }
        h1 { margin-bottom: 20px; }
        .field { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; }
        .msg { margin-top: 12px; font-size: 14px; }
        .ok { color: #0a7f37; }
        .err { color: #cc1f1f; }
    </style>
</head>
<body>
    <h1>登录</h1>
    <form id="loginForm">
        <div class="field">
            <label for="username">用户名</label>
            <input id="username" name="username" maxlength="40" required>
        </div>
        <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" maxlength="60" required>
        </div>
        <button type="submit">登录</button>
    </form>
    <p class="msg" id="msg"></p>
    <p><a href="./register.html">没有账号？去注册</a></p>

    <script>
        const form = document.getElementById('loginForm');
        const msg = document.getElementById('msg');

        function setMessage(text, success) {
            msg.textContent = text;
            msg.className = 'msg ' + (success ? 'ok' : 'err');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            setMessage('', false);

            const username = form.username.value.trim();
            const password = form.password.value.trim();

            if (!username || !password) {
                setMessage('用户名和密码不能为空。', false);
                return;
            }

            try {
                const res = await fetch('./api/auth/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const result = await res.json();
                if (result.ok) {
                    setMessage('登录成功。', true);
                } else {
                    setMessage(result.message || '登录失败。', false);
                }
            } catch (err) {
                setMessage('请求失败，请检查 PHP 服务是否运行。', false);
                console.error(err);
            }
        });
    </script>
</body>
</html>
